version: '3.5'

services:

  postgres-server:
    image: timescale/timescaledb:2.14.2-pg14
    networks:
      - zbx_net
    environment:
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=StrongPassword
      - POSTGRES_DB=zabbixdb
    volumes:
      - /zabbix-postgres:/var/lib/postgresql/data:rw
    command: postgres -c shared_preload_libraries=timescaledb

  zabbix-server-pgsql:
    image: zabbix/zabbix-server-pgsql:alpine-7.4-latest
    networks:
      - zbx_net
    ports:
      - "10051:10051"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /zabbix-data/alertscripts:/usr/lib/zabbix/alertscripts:ro
      - /zabbix-data/externalscripts:/usr/lib/zabbix/externalscripts:ro
      - /zabbix-data/export:/var/lib/zabbix/export:rw
      - /zabbix-data/modules:/var/lib/zabbix/modules:ro
      - /zabbix-data/enc:/var/lib/zabbix/enc:ro
      - /zabbix-data/ssh_keys:/var/lib/zabbix/ssh_keys:ro
      - /zabbix-data/mibs:/var/lib/zabbix/mibs:ro
      - /zabbix-data/snmptraps:/var/lib/zabbix/snmptraps:rw
    environment:
      - DB_SERVER_HOST=postgres-server
      - POSTGRES_DB=zabbixdb
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=StrongPassword
      - ZBX_JAVAGATEWAY=zabbix-java-gateway
    depends_on:
      - postgres-server

  zabbix-web-nginx-pgsql:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.4-latest
    networks:
      - zbx_net
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /zabbix-nginx/nginx:/etc/ssl/nginx:ro
      - /zabbix-nginx/modules/:/usr/share/zabbix/modules/:ro
    environment:
      - ZBX_SERVER_HOST=zabbix-server-pgsql
      - DB_SERVER_HOST=postgres-server
      - POSTGRES_DB=zabbixdb
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=StrongPassword
    depends_on:
      - postgres-server
      - zabbix-server-pgsql

  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-7.4-latest
    networks:
      - zbx_net
    ports:
      - "10052:10052"
  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-7.4-latest
    networks:
      - zbx_net
    environment:
      - ZBX_SERVER_HOST=zabbix-server-pgsql
      - ZBX_HOSTNAME=zabbix-server
    ports:
      - "10050:10050"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - zabbix-server-pgsql
  
  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: prometheus
    networks:
      - zbx_net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle


  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    networks:
      - zbx_net
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager


  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    networks:
      - zbx_net
    ports:
      - "9115:9115"


  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    networks:
      - zbx_net
    ports:
      - "9100:9100"


  # =========================
  # GRAFANA
  # =========================

  grafana:
    image: grafana/grafana:11.5.0
    container_name: grafana
    networks:
      - zbx_net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  zbx_net:
    driver: bridge
